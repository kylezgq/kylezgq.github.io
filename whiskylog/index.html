<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisky Log - 威士忌风味矩阵</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: #fff;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 标题区 */
        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .main-title {
            font-family: Verdana, sans-serif;
            font-size: 28px;
            font-weight: bold;
            margin: 0 0 8px 0;
        }
        .header-subtitle {
            font-family: Verdana, sans-serif;
            font-size: 13px;
            color: #888;
            margin: 0;
        }
        .header-subtitle a {
            color: #666;
            text-decoration: none;
        }
        .header-subtitle a:hover {
            text-decoration: underline;
        }
        .quote {
            font-family: Verdana, sans-serif;
            font-size: 14px;
            font-weight: normal;
            font-style: italic;
            color: #666;
            margin: 0;
        }

        /* 桌面端：横向三栏布局 */
        .main-layout {
            display: flex;
            gap: 20px;
        }

        /* 左侧边栏 */
        .sidebar {
            flex: 0 0 220px;
        }
        .sidebar-panel {
            margin-bottom: 20px;
        }
        .sidebar-title {
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* 搜索框 */
        .search-input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 13px;
            font-family: Verdana, sans-serif;
        }
        .btn {
            padding: 6px 15px;
            border: none;
            border-radius: 3px;
            font-size: 12px;
            cursor: pointer;
            font-family: Verdana, sans-serif;
        }
        .btn-apply {
            background: #5cb85c;
            color: white;
        }
        .btn-reset {
            background: #fff;
            color: #333;
            border: 1px solid #ccc;
        }

        /* Regions */
        .sidebar-panel + .sidebar-panel {
            margin-top: 40px;
        }
        .region-list {
            margin: 0;
            padding: 0;
            list-style: none;
        }
        .region-list li {
            margin-bottom: 6px;
        }
        .region-list label {
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.2s;
        }
        .region-list label:hover {
            opacity: 0.7;
        }
        .region-list input[type="checkbox"] {
            cursor: pointer;
        }

        /* 地图 - 精确还原 scotchgit 风格 */
        .map-panel {
            display: flex;
            justify-content: flex-start;
            margin-top: -30px;
            padding-left: 10px;
            position: relative;
        }
        .map-svg {
            width: 220px;
            height: 320px;
        }
        .map-svg path {
            fill: #f0f0f0;
            stroke: #333;
            stroke-width: 1.5;
            cursor: pointer;
            transition: fill 0.2s;
        }
        .map-svg path:hover {
            fill: #d0d0d0;
        }
        .map-svg path.active {
            fill: #4682b4;
        }

        /* 地图tooltip */
        .map-tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
            display: none;
        }

        /* 中间矩阵图 */
        .matrix-wrapper {
            flex: 1;
            min-width: 0;
        }
        .matrix-container {
            padding: 10px;
        }

        /* 顶部图例区域 - 右对齐 */
        .legend-top {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 8px;
            padding-right: 5px;
        }
        .legend-vertical-top {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-end;
        }
        .legend-item-vertical {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .legend-dot.rich { background: #d9534f; }
        .legend-dot.medium { background: #5cb85c; }
        .legend-dot.light { background: #f0ad4e; }

        .axis-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 11px;
            color: #666;
        }
        .matrix-chart {
            position: relative;
            height: 580px;
            background: #fff;
            border: 1px solid #ddd;
            overflow: hidden;
        }
        .axis-v {
            position: absolute;
            left: 50%;
            top: 5%;
            bottom: 5%;
            width: 1px;
            background: #999;
        }
        .axis-h {
            position: absolute;
            top: 50%;
            left: 5%;
            right: 5%;
            height: 1px;
            background: #999;
        }

        /* 轴线标签 - 水平中间线左右两端 */
        .axis-label-h {
            position: absolute;
            font-size: 13px;
            font-weight: bold;
            color: #000;
            top: 50%;
            transform: translateY(-50%);
        }
        .axis-label-h.left {
            left: 2%;
        }
        .axis-label-h.right {
            right: 2%;
        }

        /* 轴线标签 - 垂直中间线上下两端 */
        .axis-label-v {
            position: absolute;
            font-size: 13px;
            font-weight: bold;
            color: #000;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            white-space: nowrap;
        }
        .axis-label-v.top {
            top: 2%;
        }
        .axis-label-v.bottom {
            bottom: 2%;
        }

        /* 四个象限标签 */
        .quadrant-label {
            position: absolute;
            font-size: 13px;
            font-weight: bold;
            color: #888;
        }
        .ql-tl { left: 8%; top: 8%; }
        .ql-tr { right: 8%; top: 8%; }
        .ql-bl { left: 8%; bottom: 8%; }
        .ql-br { right: 8%; bottom: 8%; }


        /* 威士忌点 */
        .whisky-point-wrapper {
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }
        .whisky-point-wrapper:hover {
            transform: translate(-50%, -50%) scale(1.1);
            z-index: 100;
        }
        .whisky-point-wrapper.dimmed {
            opacity: 0.1;
        }
        .whisky-point-wrapper.selected .whisky-dot {
            transform: scale(1.5);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.8);
        }

        .whisky-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.3);
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .whisky-dot.rich { background: #d9534f; }
        .whisky-dot.medium { background: #5cb85c; }
        .whisky-dot.light { background: #f0ad4e; }

        .whisky-label {
            font-size: 10px;
            color: #333;
            white-space: nowrap;
            text-shadow: 0 0 2px white, 0 0 2px white, 0 0 2px white;
        }
        .whisky-label.left {
            order: -1;
        }

        /* 右侧详情面板 */
        .detail-panel {
            flex: 0 0 240px;
            min-height: 500px;
            margin-top: 75px;
        }
        .detail-content {
            display: none;
        }
        .detail-content.active {
            display: block;
            background: #f8f8f8;
            border-radius: 4px;
            padding: 15px;
            min-height: 500px;
        }

        /* 详情面板布局 */
        .detail-whisky-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.3;
        }
        .detail-subtitle {
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }

        .detail-info-grid {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 10px 5px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .detail-info-label {
            color: #666;
        }
        .detail-info-value {
            color: #333;
            font-weight: 500;
        }

        .detail-section {
            margin-bottom: 20px;
        }
        .detail-section-title {
            font-size: 12px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .word-cloud {
            background: #1a1a2e;
            color: white;
            padding: 20px;
            border-radius: 4px;
            min-height: 150px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .word {
            display: inline-block;
        }
        .word-large { font-size: 28px; color: #90ee90; }
        .word-medium { font-size: 18px; color: #87ceeb; }
        .word-small { font-size: 13px; color: #dda0dd; }

        /* 手机端响应式 */
        @media (max-width: 768px) {
            .main-layout {
                flex-direction: column;
            }
            .sidebar {
                flex: 1;
                order: 1;
            }
            .sidebar-panel + .sidebar-panel {
                margin-top: 15px;
            }
            .matrix-wrapper {
                order: 2;
            }
            .legend-top {
                justify-content: center;
                padding-right: 0;
            }
            .legend-vertical-top {
                flex-direction: row;
                gap: 15px;
            }
            .detail-panel {
                flex: 1;
                order: 3;
                min-height: auto;
            }
            .map-svg {
                width: 180px;
                height: 240px;
            }
            .matrix-chart {
                height: 400px;
            }
            .whisky-label {
                font-size: 9px;
            }
        }
    </style>
</head>

        let selectedWhisky = null;
        let activeRegions = new Set(['Highland', 'Speyside', 'Islay', 'Islands', 'Lowland', 'Campbeltown', 'Others']);

        // Initialize
        function init() {
            renderMatrix();
            setupMapInteractions();

            // 初始加载时，所有被选中的区域显示蓝色
            const checkboxes = document.querySelectorAll('.region-list input[type="checkbox"]');
            checkboxes.forEach(cb => {
                if (cb.checked) {
                    activeRegions.add(cb.value);
                }
            });
            document.querySelectorAll('.map-region').forEach(m => {
                if (activeRegions.has(m.dataset.region)) {
                    m.classList.add('active');
                }
            });
        }

        // Render matrix points
        function renderMatrix() {
            const chart = document.getElementById('matrixChart');

            whiskyData.forEach((whisky, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'whisky-point-wrapper';
                wrapper.style.left = `${whisky.x}%`;
                wrapper.style.top = `${whisky.y}%`;
                wrapper.dataset.index = index;
                wrapper.dataset.region = whisky.region || whisky.country;

                const dot = document.createElement('div');
                dot.className = `whisky-dot ${whisky.intensity}`;

                const label = document.createElement('span');
                label.className = 'whisky-label';
                label.textContent = whisky.name;

                if (whisky.x > 70) {
                    label.classList.add('left');
                }

                wrapper.appendChild(dot);
                wrapper.appendChild(label);
                wrapper.addEventListener('click', () => selectWhisky(index));

                // Hover effect: highlight same region, dim others
                wrapper.addEventListener('mouseenter', () => {
                    const targetRegion = whisky.region || whisky.country;
                    document.querySelectorAll('.whisky-point-wrapper').forEach(w => {
                        const wRegion = w.dataset.region;
                        if (wRegion !== targetRegion) {
                            w.classList.add('dimmed');
                        }
                    });
                });

                wrapper.addEventListener('mouseleave', () => {
                    // 恢复筛选状态，而不是简单地移除所有dimmed
                    applyFilters();
                });

                chart.appendChild(wrapper);
            });
        }

        // Select a whisky
        function selectWhisky(index) {
            selectedWhisky = index;
            const whisky = whiskyData[index];

            document.querySelectorAll('.whisky-point-wrapper').forEach((w, i) => {
                w.classList.toggle('selected', i === index);
            });

            const content = document.getElementById('detailContent');
            content.classList.add('active');

            const wordCloudHTML = generateWordCloud(whisky.flavorTags);

            content.innerHTML = `
                <div class="detail-whisky-name">${whisky.name}</div>
                <div class="detail-subtitle">
                    ${whisky.distillery} · ${whisky.caskType === 'Blended' ? 'Blended' : (whisky.country === 'Scotland' ? 'Scotland · ' + whisky.region : whisky.country)}
                </div>

                <div class="detail-info-grid">
                    <div class="detail-info-label">年份</div>
                    <div class="detail-info-value">${whisky.age ? whisky.age + ' 年' : 'N/A'}</div>

                    <div class="detail-info-label">酒精度</div>
                    <div class="detail-info-value">${whisky.abv ? whisky.abv + '%' : 'N/A'}</div>

                    <div class="detail-info-label">桶型/处理方式</div>
                    <div class="detail-info-value">${whisky.caskType}</div>

                    <div class="detail-info-label">酒厂</div>
                    <div class="detail-info-value">${whisky.distillery}</div>

                    <div class="detail-info-label">集团</div>
                    <div class="detail-info-value">${whisky.group}</div>
                </div>

                <div class="detail-section">
                    <div class="word-cloud">
                        ${wordCloudHTML}
                    </div>
                </div>
            `;
        }

        // Generate word cloud HTML
        function generateWordCloud(tags) {
            const sizes = ['word-large', 'word-medium', 'word-small'];
            return tags.map((tag, i) => {
                const sizeClass = sizes[i % sizes.length];
                return `<span class="word ${sizeClass}">${tag}</span>`;
            }).join('');
        }

        // Update region filter
        function updateRegionFilter() {
            const checkboxes = document.querySelectorAll('.region-list input[type="checkbox"]');
            activeRegions.clear();
            checkboxes.forEach(cb => {
                if (cb.checked) {
                    activeRegions.add(cb.value);
                }
            });

            // 同步地图高亮状态：被选中的区域显示蓝色
            document.querySelectorAll('.map-region').forEach(m => {
                if (activeRegions.has(m.dataset.region)) {
                    m.classList.add('active');
                } else {
                    m.classList.remove('active');
                }
            });

            applyFilters();
        }

        // Apply search
        function applySearch() {
            applyFilters();
        }

        // Reset all filters
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.querySelectorAll('.region-list input[type="checkbox"]').forEach(cb => {
                cb.checked = true;
            });
            activeRegions = new Set(['Highland', 'Speyside', 'Islay', 'Islands', 'Lowland', 'Campbeltown', 'Others']);

            // 全选状态下，所有地图区域都显示为蓝色
            document.querySelectorAll('.map-region').forEach(m => {
                m.classList.add('active');
            });

            // Hide detail panel
            document.getElementById('detailContent').classList.remove('active');

            applyFilters();
        }

        // Apply filters
        function applyFilters() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const points = document.querySelectorAll('.whisky-point-wrapper');

            points.forEach((wrapper, index) => {
                const whisky = whiskyData[index];
                const whiskyRegion = whisky.region || whisky.country;

                const matchesSearch = !query ||
                    whisky.name.toLowerCase().includes(query) ||
                    whisky.distillery.toLowerCase().includes(query);

                const matchesRegion = activeRegions.has(whiskyRegion);

                // 如果有搜索词，优先显示搜索结果（忽略产区筛选）
                // 如果没有搜索词，按照产区筛选显示
                if (matchesSearch && (query || matchesRegion)) {
                    wrapper.classList.remove('dimmed');
                } else {
                    wrapper.classList.add('dimmed');
                }
            });
        }

        // Setup map interactions
        function setupMapInteractions() {
            const tooltip = document.getElementById('mapTooltip');
            const mapPanel = document.querySelector('.map-panel');

            document.querySelectorAll('.map-region').forEach(region => {
                // Mouse enter - show tooltip
                region.addEventListener('mouseenter', function(e) {
                    const regionName = this.dataset.region;
                    tooltip.textContent = regionName;
                    tooltip.style.display = 'block';
                });

                // Mouse move - update tooltip position
                region.addEventListener('mousemove', function(e) {
                    const rect = mapPanel.getBoundingClientRect();
                    tooltip.style.left = (e.clientX - rect.left + 10) + 'px';
                    tooltip.style.top = (e.clientY - rect.top - 25) + 'px';
                });

                // Mouse leave - hide tooltip
                region.addEventListener('mouseleave', function() {
                    tooltip.style.display = 'none';
                });

                region.addEventListener('click', function() {
                    const regionName = this.dataset.region;
                    const isActive = this.classList.contains('active');

                    // 切换当前产区的选中状态
                    const checkbox = document.querySelector(`.region-list input[type="checkbox"][value="${regionName}"]`);

                    if (isActive) {
                        // 如果已经是蓝色，取消选中
                        checkbox.checked = false;
                        this.classList.remove('active');
                        activeRegions.delete(regionName);
                    } else {
                        // 如果未选中，选中它
                        checkbox.checked = true;
                        this.classList.add('active');
                        activeRegions.add(regionName);
                    }

                    applyFilters();
                });
            });
        }

        // Real-time search
        document.getElementById('searchInput').addEventListener('input', applyFilters);

        // Initialize on load
        init();
    </script>
