<!DOCTYPE html>
<html lang="{{ page.lang | default: "en" }}">
  {%- include head.html -%}
  <body a="{{ site.theme_config.appearance | default: "light" }}">
    <main class="page-content" aria-label="Content">
      <div class="w">
        {{ content }}
      </div>
    </main>

    </main>                                                                                                                           
                                                                                                                                        
      <footer style="max-width:640px;margin:0 auto;padding:0 2rem 4rem;font-family:monospace;font-size:16px;color:#999;text-align:center;">               
        © {{ site.time | date: "%Y" }} &nbsp;|&nbsp; <a href="/feed.xml" style="color:#999;">rss</a>
      </footer> 

    {%-if site.goat_counter and jekyll.environment == "production"-%}
      {%-include goat_counter.html-%}
    {%-endif-%}

    {% if page.custom_js %}
      {% for js_file in page.custom_js %}
        <script type="text/javascript" src="{{ site.baseurl }}/assets/js/{{ js_file }}.js"></script>
      {% endfor %}
    {% endif %}
  </body>
</html>
