---
layout: default
---

<a href="{{ '/archive.html' | relative_url }}">back</a>

<article>
  <h1>{{ page.title }}</h1>

  <p class="post-meta" style="margin-top:0.3rem; margin-bottom:1.5rem; color:#666; font-size:0.9em; text-align:left;">
    <time datetime="{{ page.date }}">{{ page.date | date: site.theme_config.date_format }}</time>
  </p>

  {{ content }}
</article>
