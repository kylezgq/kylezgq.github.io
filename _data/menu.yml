entries:
  - title: this page is the most up to date list of what i'm working on, thinking about and doing right now
  
  - title: life
    entries:
      - title: grew up in a northern coastal city in mainland china
      - title: graduated with a b.b.a. (a.k.a. bachelor of bullshit artistry) in 2024
      - title: employed by three cats & one dog

  - title: work
    entries:
      - title: i don't belong there — a conviction that has driven me to intern relentlessly, seeking out and working with the best
      - title: spent my college years interning across strategy consulting, product, corporate strategy, venture capital, and media
      - title: often skipped exams, believing the real world teaches business better than textbooks
      - title: authored books, started a business with friends, and blogged along the way
      - title: then fell into the trap of elitism and meritocracy — inflating ego, piling up titles, chasing an upward identity slope instead of real growth
      - title: over time, drifted away from the real world, from the people and things that matter most, losing both original curiosity and authentic empathy
      - title: the world isn't just startups, valuation, and fundraising — there are other games, other rules, and far more interesting things to explore
      - title: now allocating more of my bandwidth to street & documentary photography because real people interest me more than finance and grand narratives
      - title: as another version of i don't belong there, in the words of susan meiselas — the camera is an excuse to be someplace i otherwise don't belong. it gives me a point of connection, and a point of separation.

  - title: things i like to geek out on
    entries:
      - title: writing — check out my <a href='archive.html'>blog</a>
      - title: drawing — mostly sketches, see my <a href='scribbles.html'>scribbles</a>
      - title: reading — on <a href='https://www.goodreads.com/review/list/175571315'>my book shelf</a>
      - title: street & documentary photography — photos below, will turn them into portfolios one day
      - title: learn from people sharper than me, across any domain
      - title: whisky & cocktail
      - title: football
      - title: poker, including both nlhe & plo

  - title: some things i believe
    entries:
      - title: most careers turn into sales jobs when you get senior enough
      - title: if you loved your work, you'd work on sundays
        entries: 
          - title: not to equate work with a job
          - title: to be driven by curiosity rather than careerism, to give free rein to your curiosity instead of working on what you're supposed to
      - title: different is better than better
        entries: 
          - title: if you do what everyone else does, you'll get the same results everyone else gets
          - title: best practices aren't always the best, by definition, they're average
      - title: ideas are dead ends, curiosity is a through street
        entries: 
          - title: you can copy ideas but you can't copy curiosity
      - title: 10x is easier than 2x
        entries: 
          - title: one of the best ways to get unstuck from a problem is to imagine something an order of magnitude bigger, where you can't do the current process to do it
          - title: it doesn't to say you have to hit a 10x goal, its more the exercise of what would it take to be 10x bigger or do something 10 times better
          - title: to think differently about the problem means you have to more deeply understand the problem
          - title: we might call this first principle thinking
      - title: intellectual honesty
        entries: 
          - title: the best praise i've ever heard about someone was from peter fenton's remark about bill gurley, the degree to which truth comes ahead of ego or self for him
  
